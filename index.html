<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Vision Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b00;
            --primary-hover: #e65a00;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #ff6b0033 0%, rgba(10, 10, 10, 0) 60%);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .drop-zone {
            height: 250px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 0, 0.05);
        }

        .drop-zone img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .drop-zone .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            resize: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.4);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .result-content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #eee;
            font-size: 1.05rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Thị giác Groq</h1>
            <p class="subtitle">Trình thử nghiệm Llama 4 Scout Multimodal</p>
        </header>

        <div class="grid">
            <div class="upload-section">
                <div class="form-group">
                    <label>Tải ảnh lên</label>
                    <div class="drop-zone" id="dropZone">
                        <div class="icon">📷</div>
                        <p>Nhấp hoặc kéo thả ảnh vào đây</p>
                        <img id="preview" src="" alt="Xem trước">
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label>Câu hỏi / Prompt</label>
                    <textarea id="prompt" rows="4" placeholder="Bạn muốn biết gì về bức ảnh này?">Mô tả nội dung bức ảnh này.</textarea>
                </div>

                <button id="analyzeBtn">
                    <span>Phân tích ảnh</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>

            <div class="result-section">
                <div class="result-header">
                    <label>Kết quả phân tích</label>
                    <span id="status" style="font-size: 0.8rem; color: var(--primary);">Sẵn sàng</span>
                </div>
                <div id="result" class="result-content">Kết quả từ model sẽ hiện ở đây...</div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const promptInput = document.getElementById('prompt');
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        const statusSpan = document.getElementById('status');

        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--border)';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    dropZone.querySelector('.icon').style.display = 'none';
                    dropZone.querySelector('p').style.display = 'none';
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                alert('Please select an image first.');
                return;
            }

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('prompt', promptInput.value);

            // UI State
            analyzeBtn.disabled = true;
            loader.style.display = 'block';
            statusSpan.innerText = 'Đang phân tích...';
            resultDiv.innerText = 'Đang hỏi Llama 4 Scout...';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerText = data.result;
                    statusSpan.innerText = 'Hoàn thành';
                } else {
                    resultDiv.innerText = 'Lỗi: ' + (data.detail || 'Không thể phân tích ảnh');
                    statusSpan.innerText = 'Lỗi';
                }
            } catch (err) {
                resultDiv.innerText = 'Lỗi kết nối đến server.';
                statusSpan.innerText = 'Lỗi';
            } finally {
                analyzeBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
