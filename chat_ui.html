<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Agentic Vision Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
        }

        .form-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .upload-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        input[type="text"] {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 14px 20px;
            border-radius: 12px;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #preview-container {
            margin-bottom: 12px;
            display: none;
        }

        #image-preview {
            max-width: 100px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .loading-dots span {
            animation: bounce 1.4s infinite ease-in-out both;
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-radius: 100%;
            margin: 0 2px;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Qwen Vision Agent</h1>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 4px;">Powered by Qwen-32B & Vision Sub-agent</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Chào bạn! Tôi là trợ lý ảo Qwen. Bạn có thể hỏi tôi bất cứ điều gì, hoặc tải ảnh lên để tôi phân tích giúp bạn.
            </div>
        </div>

        <div class="input-area">
            <div id="preview-container">
                <img id="image-preview" src="" alt="Preview">
                <button onclick="clearImage()" style="background: none; border: none; color: #ef4444; font-size: 0.7rem; cursor: pointer; margin-left: 8px;">Xóa ảnh</button>
            </div>
            <form id="chatForm" class="form-container">
                <label class="upload-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewFile()">
                </label>
                <input type="text" id="messageInput" placeholder="Nhập câu hỏi của bạn..." required autocomplete="off">
                <button type="submit" id="sendBtn">Gửi</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview'); // Fixed ID

        function previewFile() {
            const file = imageInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function clearImage() {
            imageInput.value = '';
            previewContainer.style.display = 'none';
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            
            if (role === 'ai') {
                // Render Markdown for AI messages
                div.innerHTML = marked.parse(text);
            } else {
                div.innerText = text;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'message ai-message';
            div.id = 'loading';
            div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message && !imageInput.files[0]) return;

            addMessage(message, 'user');
            messageInput.value = '';
            
            const formData = new FormData();
            formData.append('message', message);
            if (imageInput.files[0]) {
                formData.append('image', imageInput.files[0]);
            }

            clearImage();
            addLoading();
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'Lỗi từ Server');
                }
                
                const data = await response.json();
                
                document.getElementById('loading').remove();
                addMessage(data.response, 'ai');
            } catch (error) {
                if (document.getElementById('loading')) document.getElementById('loading').remove();
                addMessage('❌ LỖI HỆ THỐNG: ' + error.message, 'ai');
                console.error(error);
            } finally {
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
